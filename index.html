            <ul className="space-y-3 text-slate-600 text-sm font-medium">
              <li className="flex items-start"><CheckCircle2 className="text-emerald-500 mr-2 shrink-0 w-5 h-5" /> <strong>Cost Avoidance</strong> dari inefisiensi desain masa lalu.</li>
              <li className="flex items-start"><CheckCircle2 className="text-emerald-500 mr-2 shrink-0 w-5 h-5" /> Menetralisir dampak kenaikan UMK melalui Tech-Substitution.</li>
              <li className="flex items-start"><CheckCircle2 className="text-emerald-500 mr-2 shrink-0 w-5 h-5" /> Skala ekonomi saat negosiasi kontrak vendor grup.</li>
            </ul>
          </Card>

          <Card className="p-8 border-t-4 border-t-blue-500 bg-white shadow-sm">
            <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mb-6">
              <Cpu className="text-blue-600" size={28} />
            </div>
            <h3 className="text-xl font-bold text-slate-900 mb-4">Future-Proof Ops</h3>
            <ul className="space-y-3 text-slate-600 text-sm font-medium">
              <li className="flex items-start"><CheckCircle2 className="text-blue-500 mr-2 shrink-0 w-5 h-5" /> Modernisasi post operasional (CCTV AI, Command Center).</li>
              <li className="flex items-start"><CheckCircle2 className="text-blue-500 mr-2 shrink-0 w-5 h-5" /> Resource allocation tepat ke titik berisiko tinggi.</li>
              <li className="flex items-start"><CheckCircle2 className="text-blue-500 mr-2 shrink-0 w-5 h-5" /> Kualitas layanan yang terukur berbasis SLA.</li>
            </ul>
          </Card>

          <Card className="p-8 border-t-4 border-t-indigo-500 bg-white shadow-sm">
            <div className="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6">
              <Target className="text-indigo-600" size={28} />
            </div>
            <h3 className="text-xl font-bold text-slate-900 mb-4">Strategic Governance</h3>
            <ul className="space-y-3 text-slate-600 text-sm font-medium">
              <li className="flex items-start"><CheckCircle2 className="text-indigo-500 mr-2 shrink-0 w-5 h-5" /> Memutus ketergantungan sewa <em>headcount</em> pasif.</li>
              <li className="flex items-start"><CheckCircle2 className="text-indigo-500 mr-2 shrink-0 w-5 h-5" /> <em>Single Source of Truth</em> untuk desain layanan se-Astra.</li>
              <li className="flex items-start"><CheckCircle2 className="text-indigo-500 mr-2 shrink-0 w-5 h-5" /> Vendor governance bertransisi ke <em>Performance-Partner</em>.</li>
            </ul>
          </Card>
        </div>
      </div>
    );

    // --- MAIN APP COMPONENT ---
    function App() {
      const [activeTabId, setActiveTabId] = useState(TAB_PAGES[0].id);
      const activeIndex = TAB_PAGES.findIndex(t => t.id === activeTabId);
      
      const handleNext = () => {
        if (activeIndex < TAB_PAGES.length - 1) setActiveTabId(TAB_PAGES[activeIndex + 1].id);
      };
      const handlePrev = () => {
        if (activeIndex > 0) setActiveTabId(TAB_PAGES[activeIndex - 1].id);
      };

      const renderContent = () => {
        switch (activeTabId) {
          case 'summary': return <PageSummary />;
          case 'gap': return <PageGap />;
          case 'framework': return <PageFramework />;
          case 'pilot': return <PagePilot />;
          case 'impact': return <PageImpact />;
          default: return <PageSummary />;
        }
      };

      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          <aside className="w-full md:w-72 bg-slate-900 text-slate-300 md:min-h-screen flex flex-col shadow-[10px_0_30px_-15px_rgba(0,0,0,0.5)] z-20 shrink-0 relative">
            <div className="p-6 md:pt-10 border-b border-slate-800 bg-slate-950 flex flex-col items-center justify-center md:items-start relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-teal-400 to-amber-500"></div>
              <div className="flex items-center mb-3">
                <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center mr-3 shadow-lg border border-blue-500/30">
                  <Building size={20} className="text-white" />
                </div>
                <div>
                  <h1 className="text-white font-extrabold text-xl tracking-tight leading-none">ASTRA</h1>
                  <span className="text-blue-400 font-bold text-xs uppercase tracking-widest leading-none">Group</span>
                </div>
              </div>
            </div>
            
            <div className="flex-1 overflow-x-auto md:overflow-y-auto no-scrollbar py-6">
              <div className="px-6 mb-4">
                <h4 className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Initiative</h4>
                <div className="text-white font-bold text-sm bg-slate-800 py-2 px-3 rounded-md border border-slate-700 shadow-inner flex items-center">
                  <Zap size={14} className="text-amber-400 mr-2" /> SmartSpend
                </div>
              </div>

              <nav className="flex md:flex-col px-4 gap-2">
                {TAB_PAGES.map((tab) => {
                  const Icon = tab.icon;
                  const isActive = activeTabId === tab.id;
                  return (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTabId(tab.id)}
                      className={`flex items-center px-4 py-3.5 rounded-xl transition-all whitespace-nowrap text-sm font-semibold w-full text-left relative overflow-hidden
                        ${isActive 
                          ? 'bg-blue-600 text-white shadow-lg transform scale-[1.02]' 
                          : 'hover:bg-slate-800 text-slate-400 hover:text-slate-100'
                        }`}
                    >
                      {isActive && <div className="absolute left-0 top-0 w-1 h-full bg-blue-300"></div>}
                      <div className={`mr-3 shrink-0 flex items-center justify-center w-6 h-6 rounded-md ${isActive ? 'bg-blue-500 text-white' : 'bg-slate-800/50 text-slate-500'}`}>
                        <Icon size={14} />
                      </div>
                      {tab.title}
                    </button>
                  );
                })}
              </nav>
            </div>
            
            <div className="p-6 hidden md:block mt-auto border-t border-slate-800 bg-slate-950">
              <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl shadow-inner relative overflow-hidden">
                <div className="absolute top-0 right-0 p-2 opacity-10"><Lock size={40} /></div>
                <div className="flex items-center text-amber-500 mb-2 relative z-10">
                  <Lock size={14} className="mr-2" />
                  <span className="text-[10px] uppercase font-bold tracking-widest">Board Confidential</span>
                </div>
                <p className="text-[11px] text-slate-400 leading-relaxed font-medium relative z-10">
                  Strategic blueprint for C-Level review. Contains internal business gap analysis.
                </p>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col relative min-h-screen pb-32 md:pb-24">
            <div className="flex-1 p-6 md:p-12 lg:p-16 max-w-6xl mx-auto w-full pb-36 md:pb-32">
              {renderContent()}
            </div>

            <div className="fixed bottom-0 md:bottom-6 left-0 md:left-auto right-0 md:right-8 w-full md:w-[calc(100%-22rem)] md:max-w-4xl mx-auto z-30">
              <div className="bg-white/90 backdrop-blur-md border-t md:border border-slate-200 md:rounded-2xl p-4 flex justify-between items-center shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] md:shadow-2xl">
                <button 
                  onClick={handlePrev}
                  disabled={activeIndex === 0}
                  className={`flex items-center px-4 py-2.5 rounded-xl font-bold text-sm transition-all ${activeIndex === 0 ? 'text-slate-300 cursor-not-allowed opacity-50' : 'text-slate-700 bg-slate-100 hover:bg-slate-200 hover:text-slate-900'}`}
                >
                  <ChevronLeft size={18} className="mr-1" /> Prev
                </button>
                
                <div className="hidden md:flex flex-col items-center">
                  <div className="text-xs font-bold text-slate-400 mb-1 tracking-widest uppercase">
                    {TAB_PAGES[activeIndex].title}
                  </div>
                  <div className="flex text-slate-400 gap-1.5">
                    {TAB_PAGES.map((_, i) => (
                      <span key={i} className={`h-1.5 rounded-full transition-all duration-500 ${i === activeIndex ? 'w-8 bg-blue-600' : 'w-2 bg-slate-200'}`} />
                    ))}
                  </div>
                </div>

                <button 
                  onClick={handleNext}
                  disabled={activeIndex === TAB_PAGES.length - 1}
                  className={`flex items-center px-6 py-2.5 rounded-xl font-bold text-sm transition-all shadow-md ${activeIndex === TAB_PAGES.length - 1 ? 'text-slate-300 bg-slate-50 cursor-not-allowed border border-slate-200 opacity-50' : 'bg-gradient-to-r from-blue-600 to-blue-700 text-white hover:shadow-lg'}`}
                >
                  {activeIndex === TAB_PAGES.length - 2 ? 'Show Impact' : 'Next'} <ChevronRight size={18} className="ml-1" />
                </button>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
